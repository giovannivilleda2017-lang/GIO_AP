name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Force Fix and Build
        run: |
          cd android
          # Forzamos Gradle 8.2
          rm -f gradle/wrapper/gradle-wrapper.properties
          mkdir -p gradle/wrapper
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-all.zip" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          
          # FIX MÁGICO para el error de Jar/bcprov
          echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 --add-exports=java.base/sun.security.x509=ALL-UNNAMED" >> gradle.properties
          
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon --no-build-cache
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GIO_AP_APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

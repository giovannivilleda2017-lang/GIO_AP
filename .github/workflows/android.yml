name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android
          
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configure and Clean Build
        run: |
          cd android
          # Configuramos la versión 8.2-bin que es más ligera
          rm -f gradle/wrapper/gradle-wrapper.properties
          mkdir -p gradle/wrapper
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          
          chmod +x gradlew
          
          # Borramos específicamente la librería que falla si existe
          find ~/.gradle/caches/ -name "*bcprov-jdk18on-1.79.jar*" -delete || true
          
          # Construimos con diagnóstico completo y refresco de dependencias
          ./gradlew clean assembleDebug --no-daemon --no-build-cache --refresh-dependencies --stacktrace --info
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GIO_AP_APK
          path: android/app/build/outputs/apk/debug/*.apk

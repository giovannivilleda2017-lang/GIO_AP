name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalando dependencias
        run: npm install --force

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Compilar GIO_AP
        run: |
          if [ -d android ]; then
            cd android
            # Usamos gradle instalado en el runner
            gradle assembleDebug --no-daemon
          else
            echo "ERROR: No existe el directorio android. ¿Olvidaste subirlo?"
            ls -R # Esto nos listara que archivos SI ve GitHub para investigar
            exit 1
          fi
          
      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: GIO_AP_APK
          path: android/app/build/outputs/apk/debug/*.apk

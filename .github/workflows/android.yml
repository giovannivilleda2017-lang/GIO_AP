name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android
          
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Configure and Build GIO_AP
        env:
          ORG_GRADLE_PROJECT_org_gradle_classpath_intrumentation_disable: 'true'
        run: |
          cd android
          # Configuramos Gradle 8.5 para total compatibilidad con Java 21
          rm -f gradle/wrapper/gradle-wrapper.properties
          mkdir -p gradle/wrapper
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-all.zip" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          
          chmod +x gradlew
          
          # Limpieza total para asegurar que no haya Jars corruptos
          rm -rf ~/.gradle/caches/
          
          # Construcción con la bandera corregida (intrumentation)
          ./gradlew assembleDebug --no-daemon --no-build-cache --stacktrace -Dorg.gradle.vfs.watch=false -Dorg.gradle.classpath.intrumentation.disable=true
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GIO_AP_APK
          path: android/app/build/outputs/apk/debug/*.apk

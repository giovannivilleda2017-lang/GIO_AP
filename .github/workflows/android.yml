name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Clean Specific Corrupt Caches
        run: |
          # Limpiamos exactamente lo que está causando el choque del Jar
          rm -rf ~/.gradle/caches/jars-9/*bcprov*
          rm -rf ~/.gradle/caches/modules-2/files-2.1/org.bouncycastle/
          rm -rf ~/.gradle/caches/transforms-3/

      - name: Build GIO_AP
        run: |
          cd android
          # Forzamos Gradle 8.2 que es tu versión estable
          rm -f gradle/wrapper/gradle-wrapper.properties
          mkdir -p gradle/wrapper
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-all.zip" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          
          chmod +x gradlew
          # Ejecutamos con los flags de limpieza que pusiste
          ./gradlew clean assembleDebug --no-daemon --no-build-cache -Dorg.gradle.vfs.watch=false
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GIO_AP_APK
          path: android/app/build/outputs/apk/debug/*.apk
